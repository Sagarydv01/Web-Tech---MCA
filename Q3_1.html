<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    font-family: Arial;
}

.container {
    display: flex;
    flex-wrap: wrap;
}

header, footer {
    background: lightblue;
    width: 100%;
    padding: 20px;
    text-align: center;
}

.sidebar {
    background: lightgray;
    flex: 1 1 200px;
    padding: 20px;
}

.content {
    background: lightgreen;
    flex: 3 1 400px;
    padding: 20px;
}

@media (max-width: 113px) {
    .container {
        flex-direction: column;
    }
}
</style>
</head>
<body>

<header>Header</header>

<div class="container">
    <div class="sidebar">Sidebar</div>
    <div class="content">Main Content</div>
</div>

<footer>Footer</footer>

</body>
</html>
