<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Array Methods</title>
</head>

<body>

<h2>JavaScript Built-in Array Methods</h2>

<p id="demo"></p>

<script>

var fruits = ["Apple", "Banana", "Mango", "Orange"];

document.write("<b>Original Array:</b> " + fruits + "<br><br>");

fruits.push("Grapes");
document.write("<b>After push():</b> " + fruits + "<br><br>");

fruits.pop();
document.write("<b>After pop():</b> " + fruits + "<br><br>");

fruits.shift();
document.write("<b>After shift():</b> " + fruits + "<br><br>");

fruits.unshift("Pineapple");
document.write("<b>After unshift():</b> " + fruits + "<br><br>");

fruits.sort();
document.write("<b>After sort():</b> " + fruits + "<br><br>");

fruits.reverse();
document.write("<b>After reverse():</b> " + fruits + "<br><br>");

</script>

</body>
</html>
