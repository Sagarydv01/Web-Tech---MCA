<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frames Example</title>
</head>
<body>

    <h1>Using Frames to Include Images and Videos</h1>

    <h2>Image in Frame</h2>
    <iframe 
        src="https://unsplash.com/photos/pattern-of-decorative-tiles-with-floral-motifs-YtHLf4k-N1Q" 
        width="600" 
        height="400">
    </iframe>

    <!-- YouTube Video Frame -->
    <h2>Video in Frame</h2>
    <iframe 
        width="560" 
        height="315" 
        src="videoplayback.mp4" 
        frameborder="0" 
        allowfullscreen>
    </iframe>

</body>
</html>
