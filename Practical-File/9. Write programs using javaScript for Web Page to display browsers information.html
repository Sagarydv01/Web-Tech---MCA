<!-- 9. Write programs using javaScript for Web Page to display browsers information. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Information</title>
</head>
<body>

<h2 align="center">Browser Information</h2>

<script>
    document.write("<b>Browser Name:</b> " + navigator.appName + "<br><br>");
    document.write("<b>Browser Version:</b> " + navigator.appVersion + "<br><br>");
    document.write("<b>User Agent:</b> " + navigator.userAgent + "<br><br>");
    document.write("<b>Platform:</b> " + navigator.platform + "<br><br>");
    document.write("<b>Language:</b> " + navigator.language + "<br><br>");
</script>

</body>
</html>
