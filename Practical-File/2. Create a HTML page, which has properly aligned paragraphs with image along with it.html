<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aligned Paragraphs with Image</title>
</head>
<body>

    <h1 align="center">Web Technology Lab</h1>

    <img src="\tulsi 2.jpg" align="right" width="250" height="200" alt="Sample Image">

    <p align="left">
        This paragraph is left aligned. 
    </p>

    <p align="center">
        This paragraph is center aligned.
    </p>

    <p align="justify">
        This paragraph is justified. Lorem ipsum dolor, sit amet consectetur adipisicing elit.
    </p>

</body>
</html>
